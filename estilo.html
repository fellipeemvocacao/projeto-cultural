        <h2>Formulário de Cadastro de Tendências</h2>
        <form oninput="resultadoNota.value=notaEstilo.value">

            <input type="text" id="nome" name="nome" placeholder="Ex:Neymar">

                <label for="email">E-mail de Contato</label>
                <input type="email" id="email" name="email" placeholder="Ex:Neymar@gmail.com">
            </p>
            <p>
                <label for="data-nasc">Data de Nascimento</label>
                <input type="date" id="data-nasc" name="data-nasc">
            
            </p>
            <p>
                <label>Quais esportes e lazer você pratica?(Marque quantos quiser)</label>
                <input type="checkbox" id="esp1" name="esportes" value="futebol">

            </p>
        </form>
